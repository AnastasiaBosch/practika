name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: mydatabase
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgresql
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd nl
        pip install -r requirements.txt
    
    - name: Run migrations
      env:
        DB_HOST: localhost
        DB_NAME: mydatabase
        DB_USER: postgres
        DB_PASSWORD: postgresql
      run: |
        cd nl
        python manage.py migrate
    
    - name: Check Python syntax
      run: |
        cd nl
        python -m py_compile catalog/models.py
        python -m py_compile catalog/views.py
        python -m py_compile catalog/forms.py
        python -m py_compile catalog/urls.py
    
    - name: Check templates syntax
      run: |
        cd nl
        python manage.py validate_templates
    
    - name: Run tests
      run: |
        cd nl
        python manage.py test --keepdb || echo "No tests yet, skipping"