{% extends "base.html" %}
{% load static %}

{% block title %}Редактирование заявки #{{ form.instance.id }} | Менеджер{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-warning text-dark rounded-top-4">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-edit fa-2x me-3"></i>
                        <div>
                            <h4 class="mb-0">Редактирование заявки (менеджер)</h4>
                            <small class="opacity-75">Заявка #{{ form.instance.id }}</small>
                        </div>
                    </div>
                </div>

                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        {{ form.as_p }}
                        
                        <div class="d-flex justify-content-between gap-3 mt-4">
                            <a href="{% url 'request_detail' form.instance.id %}" class="btn btn-outline-secondary px-4">
                                <i class="fas fa-times"></i> Отмена
                            </a>
                            <button type="submit" class="btn btn-primary px-5">
                                <i class="fas fa-save"></i> Сохранить изменения
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
